name: Quality Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
  # Allow this workflow to be called by other workflows (azure-deploy.yml)
  workflow_call:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[test]"

      - name: Backend compile check
        working-directory: ./backend
        run: |
          source .venv/bin/activate
          python -m compileall -q app

      - name: Backend Alembic migration test (SQLite)
        working-directory: ./backend
        run: |
          source .venv/bin/activate
          JTA_DATABASE_URL=sqlite:///./test_migration.db python -m alembic upgrade head
          rm -f test_migration.db

      - name: Backend tests
        working-directory: ./backend
        run: |
          source .venv/bin/activate
          python -m pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Frontend lint
        working-directory: ./frontend
        run: npm run lint

      - name: Frontend typecheck
        working-directory: ./frontend
        run: npm run typecheck

      - name: Frontend build
        working-directory: ./frontend
        run: npm run build

      - name: Run Architecture Quality Gate (Sentrux optional)
        run: |
          chmod +x scripts/quality_gate.sh
          if command -v sentrux &> /dev/null; then
            ALLOW_MISSING_SENTRUX=0 ./scripts/quality_gate.sh
          else
            echo "Sentrux not installed, skipping architecture checks"
            echo "Install with: pip install sentrux"
          fi

      - name: Quality Gate Summary
        if: always()
        run: |
          echo "========================================"
          echo "Quality Gate Complete"
          echo "========================================"
          echo "Backend: compile | migrations | tests"
          echo "Frontend: lint | typecheck | build"
          echo ""
          echo "Check individual step logs above for results"
